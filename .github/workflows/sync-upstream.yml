name: Sync with upstream
on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge upstream changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/paper-design/agent-plugins.git
          git fetch upstream
          git checkout main
          git rebase upstream/main || { git rebase --abort; git merge -X ours upstream/main; }
          git push origin main
